name: Build EmuCoreX

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

env:
  NDK_VERSION: "27.0.12077973"
  CMAKE_VERSION: "3.22.1"
  GRADLE_OPTS: "-Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.jvmargs=-Xmx4g"

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-wrapper-

      - name: Bridge PCSX2/pcsx2 case mismatch
        run: |
          cd app/src/main/cpp
          if [ -d pcsx2 ] && [ ! -e PCSX2 ]; then
            ln -s pcsx2 PCSX2
            echo "Created symbolic link PCSX2 -> pcsx2"
          elif [ -e PCSX2 ]; then
            echo "Link PCSX2 already exists. Skipping."
          else
            echo "Directory pcsx2 not found. Skipping."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK and CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/cmake/${{ env.CMAKE_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}-cmake-${{ env.CMAKE_VERSION }}
          restore-keys: |
            android-ndk-${{ env.NDK_VERSION }}-

      - name: Install Android NDK and CMake
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}" "cmake;${{ env.CMAKE_VERSION }}"

      - name: Cache native (CMake/Ninja) build objects
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
          key: cxx-${{ runner.os }}-${{ github.event.inputs.build_type }}-${{ hashFiles('app/src/main/cpp/**/CMakeLists.txt') }}
          restore-keys: |
            cxx-${{ runner.os }}-${{ github.event.inputs.build_type }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Download bundled PCSX2 patches archive
        run: |
          PATCHES_DIR="app/src/main/cpp/PCSX2/bin/resources"
          PATCHES_FILE="$PATCHES_DIR/patches.zip"
          if [ ! -f "$PATCHES_FILE" ]; then
            mkdir -p "$PATCHES_DIR"
            curl -fL -o "$PATCHES_FILE" "https://github.com/PCSX2/pcsx2_patches/releases/latest/download/patches.zip"
          fi

      - name: Provide placeholder google-services.json if missing
        run: |
          if [ ! -f app/google-services.json ]; then
            echo "::warning::app/google-services.json not found, generating a placeholder so the Firebase plugin does not fail the build."
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.sbro.emucorex"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "placeholder-key" }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build and locate APK
        id: find_apk
        run: |
          BUILD_START=$(date +%s)
          ./gradlew :app:assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} --build-cache --stacktrace --no-daemon
          BUILD_END=$(date +%s)
          echo "build_seconds=$((BUILD_END - BUILD_START))" >> "$GITHUB_OUTPUT"

          # Locate the most recently modified APK
          APK_PATH=$(ls -t app/build/outputs/apk/**/*.apk 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file was produced."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Sign release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          KEYSTORE=~/.android/release.keystore
          mkdir -p ~/.android
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" -storetype PKCS12 \
              -alias emucorex-ci -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KEY_PASS" \
              -dname "CN=EmuCoreX CI, OU=CI, O=CI, L=CI, S=CI, C=US"
          fi
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n 1)
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" --ks-pass pass:"$KS_PASS" --key-pass pass:"$KEY_PASS" \
            --ks-key-alias emucorex-ci \
            "${{ steps.find_apk.outputs.apk_path }}"
          "$BUILD_TOOLS/apksigner" verify "${{ steps.find_apk.outputs.apk_path }}"
        env:
          KS_PASS: emucorex-ci-temp
          KEY_PASS: emucorex-ci-temp

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmuCoreX-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 9

      - name: Summary
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          BUILD_MINS=$(( ${{ steps.find_apk.outputs.build_seconds }} / 60 ))
          BUILD_SECS=$(( ${{ steps.find_apk.outputs.build_seconds }} % 60 ))
          {
            echo "### EmuCoreX Build Report"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Build type | \`${{ github.event.inputs.build_type }}\` |"
            echo "| APK path | \`$APK_PATH\` |"
            echo "| Size | $APK_SIZE |"
            echo "| Build time | ${BUILD_MINS}m ${BUILD_SECS}s |"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| SHA256 | \`$APK_SHA256\` |"
          } >> "$GITHUB_STEP_SUMMARY"